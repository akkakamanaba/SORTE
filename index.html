<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Death Store Raspadinha</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#120020,#05000c);
color:white;
text-align:center;
overflow-x:hidden;
}

/* ===== TELA INICIAL ===== */

.hero{
padding:50px 20px;
}

.logo{
font-size:42px;
font-weight:bold;
letter-spacing:4px;
color:#e8b8ff;
text-shadow:0 0 20px #a200ff;
}

.subtitle{
margin-top:10px;
opacity:0.8;
}

.loginBox{
margin-top:30px;
background:#140022;
padding:25px;
border-radius:15px;
display:inline-block;
box-shadow:0 0 20px #7a00ff;
}

input{
padding:12px;
border:none;
border-radius:8px;
width:200px;
margin-top:10px;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#8a00ff;
color:white;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 10px #8a00ff;
}

button:hover{
transform:scale(1.05);
}

/* ===== GRID ===== */

.grid{
margin-top:30px;
display:grid;
grid-template-columns:repeat(3,110px);
gap:18px;
justify-content:center;
}

.card{
position:relative;
width:110px;
height:110px;
background:#16002b;
border-radius:14px;
overflow:hidden;
box-shadow:0 0 15px #7a00ff;
}

.value{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
font-weight:bold;
opacity:0;
}

canvas{
position:absolute;
top:0;
left:0;
}

/* ===== RESULTADO ===== */

#result{
margin-top:30px;
font-size:26px;
}

/* ===== GEMAS ===== */

.gem{
animation:shine 1.5s infinite alternate;
}

@keyframes shine{
from{filter:drop-shadow(0 0 5px #00ffd5);}
to{filter:drop-shadow(0 0 20px #00ffd5);}
}

/* ===== CONFETE ===== */

.confetti{
position:fixed;
width:8px;
height:8px;
background:red;
top:-10px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(720deg);
opacity:0;
}
}

</style>
</head>

<body>

<div class="hero">

<div class="logo">DEATH STORE</div>
<div class="subtitle">Raspadinha Oficial 💎</div>

<div class="loginBox" id="login">

<p>Digite sua KEY</p>

<input id="keyInput" placeholder="DS-XXXX">
<br><br>
<button onclick="checkKey()">ENTRAR</button>

<p id="msg"></p>

</div>

</div>

<div id="game" style="display:none">

<p>Raspe apenas 1 quadrado</p>

<div class="grid" id="grid"></div>

<p id="result"></p>

</div>

<script>

/* ===== KEYS ===== */

const keys={

"DS-A1K9":"1.1M 💎",
"DS-B3L2":"1.2M 💎",
"DS-C7P4":"1.3M 💎",
"DS-D8T6":"1.4M 💎",
"DS-E2X5":"1.5M 💎",

"DS-F4Q1":"1.2M 💎",
"DS-G6M3":"1.1M 💎",
"DS-H9Z7":"1.4M 💎",
"DS-J2K8":"1.3M 💎",
"DS-K5R6":"1.5M 💎",

"DS-L1V4":"1.2M 💎",
"DS-M7S9":"1.3M 💎",
"DS-N8F2":"1.4M 💎",
"DS-P3H5":"1.1M 💎",
"DS-Q4Y7":"1.5M 💎",

"DS-R9C1":"1.2M 💎",
"DS-S6D8":"1.3M 💎",
"DS-T5B4":"1.4M 💎",
"DS-U2E7":"1.1M 💎",

"DS-ULTRA40":"40M 💎"

};

const fakeValues=[
"1.1M 💎","1.2M 💎","1.3M 💎","1.4M 💎","1.5M 💎",
"17M 💎","33M 💎","50M 💎"
];

let currentKey=null;
let scratched=false;
let valores=[];

/* ===== LOGIN ===== */

function checkKey(){

const k=document.getElementById("keyInput").value.trim();

if(!keys[k]){
document.getElementById("msg").innerText="Key inválida";
return;
}

if(localStorage.getItem("used_"+k)){
document.getElementById("msg").innerText="Key já usada";
return;
}

currentKey=k;

document.getElementById("login").style.display="none";
document.getElementById("game").style.display="block";

startGame();

}

/* ===== INICIAR ===== */

function startGame(){

valores=[];

for(let i=0;i<9;i++){
valores.push(fakeValues[Math.floor(Math.random()*fakeValues.length)]);
}

const grid=document.getElementById("grid");
grid.innerHTML="";

for(let i=0;i<9;i++){
createCard(i);
}

}

/* ===== CARTA ===== */

function createCard(index){

const card=document.createElement("div");
card.className="card";

const value=document.createElement("div");
value.className="value";
value.innerHTML=valores[index];

const canvas=document.createElement("canvas");
canvas.width=110;
canvas.height=110;

const ctx=canvas.getContext("2d");

ctx.fillStyle="#999";
ctx.fillRect(0,0,110,110);

ctx.globalCompositeOperation="destination-out";

let holding=false;

/* som raspadinha */

function playScratch(){
const audio=new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=");
audio.play();
}

function scratch(e){

if(!holding || scratched) return;

playScratch();

const rect=canvas.getBoundingClientRect();

const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;

ctx.beginPath();
ctx.arc(x,y,18,0,Math.PI*2);
ctx.fill();

const pixels=ctx.getImageData(0,0,110,110).data;

let count=0;

for(let i=3;i<pixels.length;i+=40){
if(pixels[i]===0) count++;
}

if(count>180){

scratched=true;
reveal(index);

}

}

canvas.addEventListener("mousedown",()=>holding=true);
canvas.addEventListener("mouseup",()=>holding=false);
canvas.addEventListener("mousemove",scratch);

canvas.addEventListener("touchstart",()=>holding=true);
canvas.addEventListener("touchend",()=>holding=false);
canvas.addEventListener("touchmove",scratch);

card.appendChild(value);
card.appendChild(canvas);

document.getElementById("grid").appendChild(card);

}

/* ===== CONFETE ===== */

function confetti(){

for(let i=0;i<120;i++){

const c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=`hsl(${Math.random()*360},100%,50%)`;

c.style.animationDuration=(2+Math.random()*2)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),4000);

}

}

/* ===== REVELAR ===== */

function reveal(index){

valores[index]=keys[currentKey];

document.querySelectorAll(".value").forEach((v,i)=>{

v.innerHTML=valores[i];

if(valores[i].includes("💎")){
v.classList.add("gem");
}

v.style.opacity=1;

});

document.querySelectorAll("canvas").forEach(c=>c.remove());

localStorage.setItem("used_"+currentKey,"true");

confetti();

document.getElementById("result").innerHTML=
"🎉 VOCÊ GANHOU <b>"+keys[currentKey]+"</b>";

}

</script>

</body>
</html>
