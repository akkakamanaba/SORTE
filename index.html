<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death Store | Roulette System</title>
    <style>
        :root {
            --bg: #000000;
            --panel: #0a0a0a;
            --red: #ff0000;
            --gold: #ffcc00;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--red);
        }

        .logo { font-size: 22px; font-weight: 900; }
        .logo span { color: var(--red); }
        .saldo { color: var(--gold); font-size: 18px; }

        main { flex: 1; display: flex; justify-content: center; align-items: center; }

        #login-box {
            background: var(--panel);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid var(--red);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
            text-align: center;
            width: 350px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid #fff;
            border-radius: 8px;
            color: #fff;
            text-align: center;
            margin: 20px 0;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--red);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        #game-box { display: none; flex-direction: column; align-items: center; }

        .roulette {
            width: 320px;
            height: 100px;
            border: 2px solid #333;
            position: relative;
            overflow: hidden;
            background: #050505;
            margin: 20px 0;
            border-radius: 10px;
        }

        .pointer {
            position: absolute;
            left: 0; top: 50%;
            transform: translateY(-50%);
            border-left: 20px solid var(--red);
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            z-index: 10;
        }

        .strip {
            display: flex;
            flex-direction: column;
            transition: transform 9s cubic-bezier(0.1, 0, 0.1, 1);
        }

        .item {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid #111;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">DEATH<span>STORE</span></div>
 <div class="saldo">SALDO: <span id="saldo-txt">0</span></div>
    </header>    <main>

        
        <section id="login-box">
            <h2 style="color: var(--red)">LOGIN KEY</h2>
            <input type="text" id="key-in" placeholder="COLE SUA KEY">
            <button class="btn" onclick="entrar()">ATIVAR ACESSO</button>
            <p id="msg" style="color: red; margin-top: 10px; font-size: 12px;"></p>
        </section>

        <section id="game-box">
            <div class="roulette">
                <div class="pointer"></div>
                <div id="strip" class="strip"></div>
            </div>
            <button id="spin-btn" class="btn" style="width: 220px;" onclick="girar()">GIRAR (CUSTO: 5)</button>
            <p id="res" style="margin-top: 15px; font-weight: bold;"></p>
        </section>
    </main>

    <script>
        let keysValidas = ["DEATH-STORE27362", "DEATH-822GD", "DEATH-0YDQ3", "DEATH-04HDUB", "DEATH-JI05"];
        let saldo = 0;
        const ITEM_H = 100;

        function entrar() {
            const input = document.getElementById('key-in').value.trim();
            const idx = keysValidas.indexOf(input);

            if (idx !== -1) {
                keysValidas.splice(idx, 1);
                saldo = 10;
                document.getElementById('saldo-txt').textContent = saldo;
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('game-box').style.display = 'flex';
                montarRoleta();
            } else {
                document.getElementById('msg').textContent = "KEY INVÁLIDA OU JÁ USADA!";
            }
        }

        function montarRoleta() {
            const strip = document.getElementById('strip');
            
            // Criamos uma lista de prêmios de Key 5 até Key 30
            let premiosBase = [];
            for(let i=5; i<=30; i+=5) {
                premiosBase.push(`KEY ${i}`);
            }

            // Criamos uma lista grande com muitos "NADA" e as "KEYS" misturadas
            let itensFinais = [];
            for(let i=0; i<400; i++) {
                // A cada 3 itens "NADA", colocamos uma KEY aleatória da lista
                if(i % 4 === 0) {
                    const randomKey = premiosBase[Math.floor(Math.random() * premiosBase.length)];
                    itensFinais.push(randomKey);
                } else {
                    itensFinais.push("NADA");
                }
            }

            // IMPORTANTE: Garantimos que a posição de parada (índice 350) seja NADA
            itensFinais[350] = "NADA";

            strip.innerHTML = '';
            itensFinais.forEach(texto => {
                const div = document.createElement('div');
                div.className = 'item';
                div.textContent = texto;
                div.style.color = texto === "NADA" ? "#333" : "var(--gold)";
                strip.appendChild(div);
            });
        }

        function girar() {
            if(saldo < 5) return;
            saldo -= 5;
            document.getElementById('saldo-txt').textContent = saldo;
            document.getElementById('spin-btn').disabled = true;
            document.getElementById('res').textContent = "SORTEANDO...";

            const strip = document.getElementById('strip');
            strip.style.transition = 'none';
            strip.style.transform = 'translateY(0)';
            void strip.offsetHeight;

            strip.style.transition = 'transform 9s cubic-bezier(0.1, 0, 0.1, 1)';
            
            // A parada é calculada para cair no índice 350 (que forçamos ser NADA)
            const paradaPx = ITEM_H * 350; 
            strip.style.transform = `translateY(-${paradaPx}px)`;

            setTimeout(() => {
                document.getElementById('res').textContent = "RESULTADO: NADA";
                document.getElementById('res').style.color = "red";
                if(saldo >= 5) document.getElementById('spin-btn').disabled = false;
            }, 9500);
        }
    </script>
</body>
</html>
