<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Death Store Raspadinha</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#2b0050,#0d001a);
color:white;
text-align:center;
}

h1{
margin-top:30px;
}

.grid{
margin-top:20px;
display:grid;
grid-template-columns:repeat(3,100px);
gap:15px;
justify-content:center;
}

.card{
position:relative;
width:100px;
height:100px;
background:#111;
border-radius:10px;
overflow:hidden;
}

.value{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:18px;
}

canvas{
position:absolute;
top:0;
left:0;
touch-action:none;
}

input{
padding:10px;
border-radius:6px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#7a00ff;
color:white;
font-weight:bold;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:20px;
}

</style>
</head>
<body>

<h1>DEATH STORE RASPADINHA</h1>

<div id="login">

<input id="keyInput" placeholder="Digite sua key">
<button onclick="checkKey()">Entrar</button>

<p id="msg"></p>

</div>

<div id="game" style="display:none;">

<p>Raspe apenas 1 quadrado</p>

<div class="grid" id="grid"></div>

<p id="result"></p>

</div>

<script>

const keys=[
"DS-F7K2","DS-R4M9","DS-T8L3","DS-Q2W6","DS-H5N1",
"DS-P9C4","DS-Z6B8","DS-X3D7","DS-J1V5","DS-A8S2"
];

const premiosBaixos=[
"1M 💎",
"1.2M 💎",
"1.3M 💎",
"1.4M 💎",
"1.5M 💎"
];

const premiosAltos=[
"8M 💎",
"17M 💎",
"33M 💎",
"45M 💎"
];

let scratched=false;
let currentKey=null;

function checkKey(){

const k=document.getElementById("keyInput").value.trim();

if(!keys.includes(k)){
document.getElementById("msg").innerText="Key inválida";
return;
}

if(localStorage.getItem("used_"+k)){
document.getElementById("msg").innerText="Essa key já foi usada!";
return;
}

currentKey=k;

document.getElementById("login").style.display="none";
document.getElementById("game").style.display="block";

startGame();

}

function startGame(){

const grid=document.getElementById("grid");

grid.innerHTML="";
scratched=false;

document.getElementById("result").innerText="";

for(let i=0;i<9;i++){
createCard();
}

}

function createCard(){

const card=document.createElement("div");
card.className="card";

const valueDiv=document.createElement("div");
valueDiv.className="value";
valueDiv.innerHTML="?";

const canvas=document.createElement("canvas");

canvas.width=100;
canvas.height=100;

const ctx=canvas.getContext("2d");

ctx.fillStyle="#999";
ctx.fillRect(0,0,100,100);

ctx.globalCompositeOperation="destination-out";

let holding=false;

function scratch(e){

if(!holding || scratched) return;

e.preventDefault();

const rect=canvas.getBoundingClientRect();

const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;

ctx.beginPath();
ctx.arc(x,y,15,0,Math.PI*2);
ctx.fill();

const pixels=ctx.getImageData(0,0,100,100).data;

let count=0;

for(let i=3;i<pixels.length;i+=50){
if(pixels[i]===0) count++;
}

if(count>150){

scratched=true;

const premioBaixo=premiosBaixos[Math.floor(Math.random()*premiosBaixos.length)];

valueDiv.innerHTML=premioBaixo;

finishGame(premioBaixo);

}

}

canvas.addEventListener("mousedown",()=>holding=true);
canvas.addEventListener("mouseup",()=>holding=false);
canvas.addEventListener("mousemove",scratch);

canvas.addEventListener("touchstart",()=>holding=true);
canvas.addEventListener("touchend",()=>holding=false);
canvas.addEventListener("touchmove",scratch);

card.appendChild(valueDiv);
card.appendChild(canvas);

document.getElementById("grid").appendChild(card);

}

function finishGame(valor){

localStorage.setItem("used_"+currentKey,"true");

/* revelar todos */

const cards=document.querySelectorAll(".value");

cards.forEach(c=>{

if(c.innerHTML=="?"){
c.innerHTML=premiosAltos[Math.floor(Math.random()*premiosAltos.length)];
}

});

/* remover raspagem */

const canvases=document.querySelectorAll("canvas");

canvases.forEach(c=>{
c.remove();
});

document.getElementById("result").innerHTML=
"🎉 Você ganhou: <b>"+valor+"</b>";

}

</script>

</body>
</html>
